provider: ollama   # "ollama" or "openai" — the only line that changes between modes

ollama:
  base_url: ${OLLAMA_BASE_URL:-http://localhost:11434/v1}
  api_key: ollama

openai:
  base_url: https://api.openai.com/v1
  api_key: ${OPENAI_API_KEY}

agents:
  planner:
    model: qwen2.5:7b-instruct-q4_K_M
    max_tokens: 512
    temperature: 0
    num_ctx: 4096
  responder:
    model: qwen2.5:7b-instruct-q4_K_M
    max_tokens: 1024
    temperature: 0.3
    max_retries: 3
    num_ctx: 8192
  weather:
    model: llama3.2:3b-instruct-q4_K_M
    max_tokens: 256
    temperature: 0
    max_retries: 3
    num_ctx: 2048
  web_search:
    model: qwen2.5:7b-instruct-q4_K_M
    max_tokens: 512
    temperature: 0
    max_retries: 3
    num_ctx: 4096

tools:
  calculator:
    enabled: true
  weather:
    enabled: true
    api_key: ${WEATHER_API_KEY}
    timeout_seconds: 5
  web_search:
    enabled: true
    api_key: ${TAVILY_API_KEY}
    max_results: 5
  unit_converter:
    enabled: true
    currency_api_key: ${EXCHANGE_API_KEY}

cache:
  enabled: true
  llm_cache_path: ./.cache/langchain.db
  tool_ttls:
    calculator: 0
    weather: 300
    web_search: 600
    unit_converter: 60

executor:
  max_waves: 10
  max_parallel_tools: 8
  tool_timeout_seconds: 15

graph:
  max_retries: 3
