# Full stack: Redis, FastAPI API, static chat UI (nginx).
#
# OpenAI (default):  docker compose up --build
# Ollama in Docker:  docker compose --profile ollama up --build
#                    See docs/project-instruction/docker.md for .env values.
#
# API: http://127.0.0.1:8000  UI: http://127.0.0.1:8080  Redis: localhost:6379

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Sidecar LLM — only when using: docker compose --profile ollama up
  ollama:
    profiles:
      - ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    # GPU (Linux / Windows WSL2 + NVIDIA Container Toolkit): uncomment below.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Pulls the default model into the ollama volume (does not block the API).
  # Set OLLAMA_PULL_MODEL in .env to match config/ollama.yaml if you change models.
  ollama-pull:
    profiles:
      - ollama
    image: ollama/ollama:latest
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
      MODEL_TO_PULL: ${OLLAMA_PULL_MODEL:-}
    entrypoint:
      - /bin/sh
      - -c
      - |
          set -e
          MODEL="$${MODEL_TO_PULL:-qwen2.5:7b-instruct-q4_K_M}"
          exec /bin/ollama pull "$$MODEL"
    depends_on:
      ollama:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Resolved from host .env at compose parse time (override same keys from env_file).
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434/v1}
      DATABASE_URL: sqlite+aiosqlite:////data/app.db
      REDIS_URL: redis://redis:6379/0
      REDIS_OPTIONAL: "false"
      CORS_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - sqlite_data:/data
      - ./.env:/app/.env:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  web:
    build:
      context: ./chat-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000
        VITE_API_KEY: ${VITE_API_KEY:-}
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  sqlite_data:
  ollama_data:
