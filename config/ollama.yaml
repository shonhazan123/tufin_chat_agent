provider: ollama

ollama:
  base_url: ${OLLAMA_BASE_URL:-http://localhost:11434/v1}
  api_key: ollama

agents:
  planner:
    model: qwen2.5:7b-instruct-q4_K_M
    max_tokens: 512
    temperature: 0
    num_ctx: 4096
  responder:
    model: qwen2.5:7b-instruct-q4_K_M
    max_tokens: 1024
    temperature: 0.3
    max_retries: 3
    num_ctx: 8192
  weather:
    model: qwen2.5:7b-instruct-q4_K_M
    max_tokens: 256
    temperature: 0
    max_retries: 3
    num_ctx: 2048
  web_search:
    model: qwen2.5:7b-instruct-q4_K_M
    max_tokens: 512
    temperature: 0
    max_retries: 3
    num_ctx: 4096
  calculator:
    model: qwen2.5:7b-instruct-q4_K_M
    max_tokens: 256
    temperature: 0
    max_retries: 3
    num_ctx: 2048
  unit_converter:
    model: qwen2.5:7b-instruct-q4_K_M
    max_tokens: 256
    temperature: 0
