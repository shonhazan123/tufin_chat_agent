provider: ollama

ollama:
  base_url: ${OLLAMA_BASE_URL:-http://localhost:11434/v1}
  api_key: ollama

# Default model: mistral (Docker GPU-friendly; see docs/project-instruction/docker.md).
# Context capped at 4096 via num_ctx (sent via API extra_body in agent/llm.py) to limit KV VRAM.

agents:
  planner:
    model: mistral
    max_tokens: 512
    temperature: 0
    num_ctx: 4096
  responder:
    model: mistral
    max_tokens: 1024
    temperature: 0.3
    max_retries: 3
    num_ctx: 4096
  weather:
    model: mistral
    max_tokens: 256
    temperature: 0
    max_retries: 3
    num_ctx: 2048
  web_search:
    model: mistral
    max_tokens: 512
    temperature: 0
    max_retries: 3
    num_ctx: 4096
  calculator:
    model: mistral
    max_tokens: 256
    temperature: 0
    max_retries: 3
    num_ctx: 2048
  unit_converter:
    model: mistral
    max_tokens: 256
    temperature: 0
    max_retries: 3
    num_ctx: 2048
  database_query:
    model: mistral
    max_tokens: 512
    temperature: 0
    max_retries: 3
    num_ctx: 4096
